name: emergency_services
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  firebase_database: ^10.5.7


  google_maps_flutter: ^2.6.0    
  
  google_maps_flutter_web: ^0.5.4
  
  url_launcher: ^6.2.5

  # 🔥 إضافة الصوت
  audioplayers: ^5.2.1
  video_player: ^2.9.2

  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.2

  # flutter_file_downloader: ^1.2.1
  flutter_file_downloader: ^2.1.0


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/sounds/alert.mp3  # 🔥 ملف الصوت


flutter_launcher_icons:
  android: true
